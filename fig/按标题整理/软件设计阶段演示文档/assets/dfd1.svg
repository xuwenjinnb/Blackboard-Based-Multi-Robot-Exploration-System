  <path d="M1245 735 C1250 610 1240 390 1210 277" class="flow"/>
  <path d="M1195 455 C1255 390 1248 292 1226 274" class="flow"/>
  <path d="M1180 645 C1240 560 1235 370 1218 275" class="flow"/>
  <path d="M1118 188 C880 210 745 260 720 257" class="flow"/>
</svg>
