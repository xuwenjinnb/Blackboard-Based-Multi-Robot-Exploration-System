<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1240" viewBox="0 0 1600 1240">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c9f90"/>
    </marker>
    <marker id="returnArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8aa1b4"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#8fa2b4" flood-opacity="0.14"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #fbfdff; }
    .title { font: 700 30px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #29465f; }
    .sub { font: 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #657d90; }
    .boxText { font: 700 15px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #31536b; text-anchor: middle; }
    .small { font: 12px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #657d90; text-anchor: middle; }
    .life { stroke: #bfd3e2; stroke-width: 1.4; stroke-dasharray: 7 7; }
    .bar { fill: #dff2ea; stroke: #9bcdbb; stroke-width: 1; rx: 5; }
    .barApi { fill: #fff0dd; stroke: #e2b985; stroke-width: 1; rx: 5; }
    .barRobot { fill: #edf2ff; stroke: #aab9dd; stroke-width: 1; rx: 5; }
    .barCtrl { fill: #f3ecff; stroke: #bea9df; stroke-width: 1; rx: 5; }
    .barNav { fill: #edf8ff; stroke: #9ec4de; stroke-width: 1; rx: 5; }
    .section { fill: #ffffff; stroke: #cbddeb; stroke-width: 1.3; rx: 14; filter: url(#shadow); }
    .s1 { fill: #f6fbff; }
    .s2 { fill: #fffaf2; }
    .s3 { fill: #f7fffb; }
    .s4 { fill: #f7f9ff; }
    .s5 { fill: #fff8fb; }
    .label { fill: #ffffff; stroke: #bed2e2; stroke-width: 1; rx: 9; }
    .labelText { font: 700 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #3c5e74; }
    .msg { stroke: #6c9f90; stroke-width: 2.1; marker-end: url(#arrow); }
    .ret { stroke: #8aa1b4; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#returnArrow); }
    .msgText { font: 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #345f55; text-anchor: middle; paint-order: stroke fill; stroke: #fbfdff; stroke-width: 5px; stroke-linejoin: round; }
    .retText { font: 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #596f80; text-anchor: middle; paint-order: stroke fill; stroke: #fbfdff; stroke-width: 5px; stroke-linejoin: round; }
    .loop { fill: none; stroke: #a9d7c5; stroke-width: 1.6; stroke-dasharray: 8 6; rx: 12; }
    .loopText { font: 700 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #4d806f; }
    .note { fill: #fffdf3; stroke: #e4d6a8; stroke-width: 1; rx: 10; }
    .noteText { font: 12px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #6b6450; }
  </style>

  <rect class="bg" width="1600" height="1240"/>
  <text class="title" x="800" y="48" text-anchor="middle">多小车协作巡检仿真系统顺序图</text>
  <text class="sub" x="800" y="76" text-anchor="middle">每条箭头标明：发起方做什么、传递什么数据、接收方产生什么结果</text>

  <!-- Participant headers -->
  <g>
    <rect x="45" y="105" width="125" height="56" rx="13" fill="#eaf4ff" stroke="#8ebce6"/>
    <text class="boxText" x="107.5" y="129">用户</text>
    <text class="small" x="107.5" y="149">系统运行员</text>

    <rect x="248" y="105" width="140" height="56" rx="13" fill="#effff8" stroke="#8ccdb4"/>
    <text class="boxText" x="318" y="129">前端界面</text>
    <text class="small" x="318" y="149">Dashboard</text>

    <rect x="470" y="105" width="155" height="56" rx="13" fill="#fff3e3" stroke="#e2b47f"/>
    <text class="boxText" x="547.5" y="129">后端服务</text>
    <text class="small" x="547.5" y="149">FastAPI/调度器</text>

    <rect x="715" y="105" width="140" height="56" rx="13" fill="#eaf8f5" stroke="#7fc5ba"/>
    <text class="boxText" x="785" y="129">Redis黑板</text>
    <text class="small" x="785" y="149">共享状态</text>

    <rect x="955" y="105" width="135" height="56" rx="13" fill="#f0f4ff" stroke="#a4b4dc"/>
    <text class="boxText" x="1022.5" y="129">Robot小车</text>
    <text class="small" x="1022.5" y="149">感知执行</text>

    <rect x="1168" y="105" width="145" height="56" rx="13" fill="#f6efff" stroke="#bda7df"/>
    <text class="boxText" x="1240.5" y="129">Controller</text>
    <text class="small" x="1240.5" y="149">任务分配</text>

    <rect x="1385" y="105" width="140" height="56" rx="13" fill="#eef8ff" stroke="#96c1df"/>
    <text class="boxText" x="1455" y="129">Navigator</text>
    <text class="small" x="1455" y="149">路径规划</text>
  </g>

  <!-- Section backgrounds -->
  <rect class="section s1" x="30" y="190" width="1540" height="170"/>
  <rect class="label" x="54" y="178" width="130" height="26"/>
  <text class="labelText" x="69" y="196">1 登录认证</text>

  <rect class="section s2" x="30" y="390" width="1540" height="205"/>
  <rect class="label" x="54" y="378" width="145" height="26"/>
  <text class="labelText" x="69" y="396">2 配置并启动</text>

  <rect class="section s3" x="30" y="625" width="1540" height="360"/>
  <rect class="label" x="54" y="613" width="160" height="26"/>
  <text class="labelText" x="69" y="631">3 协作巡检循环</text>
  <rect class="loop" x="66" y="664" width="1465" height="282"/>
  <text class="loopText" x="84" y="686">loop 每个 tick：Robot 感知执行 -> Controller 分配任务 -> Navigator 规划路径</text>

  <rect class="section s4" x="30" y="1015" width="1540" height="110"/>
  <rect class="label" x="54" y="1003" width="130" height="26"/>
  <text class="labelText" x="69" y="1021">4 实时刷新</text>

  <rect class="section s5" x="30" y="1150" width="1540" height="62"/>
  <rect class="label" x="54" y="1138" width="160" height="26"/>
  <text class="labelText" x="69" y="1156">5 停止与保存</text>

  <!-- Lifelines -->
  <g>
    <line class="life" x1="107.5" y1="162" x2="107.5" y2="1210"/>
    <line class="life" x1="318" y1="162" x2="318" y2="1210"/>
    <line class="life" x1="547.5" y1="162" x2="547.5" y2="1210"/>
    <line class="life" x1="785" y1="162" x2="785" y2="1210"/>
    <line class="life" x1="1022.5" y1="162" x2="1022.5" y2="1210"/>
    <line class="life" x1="1240.5" y1="162" x2="1240.5" y2="1210"/>
    <line class="life" x1="1455" y1="162" x2="1455" y2="1210"/>
  </g>

  <!-- Activation bars -->
  <rect class="bar" x="312" y="205" width="12" height="390"/>
  <rect class="barApi" x="541.5" y="240" width="12" height="930"/>
  <rect class="bar" x="779" y="270" width="12" height="830"/>
  <rect class="barRobot" x="1016.5" y="690" width="12" height="120"/>
  <rect class="barCtrl" x="1234.5" y="795" width="12" height="82"/>
  <rect class="barNav" x="1449" y="875" width="12" height="72"/>

  <!-- 1 Login -->
  <line class="msg" x1="107.5" y1="220" x2="318" y2="220"/>
  <text class="msgText" x="213" y="211">① 输入账号密码：username / password</text>

  <line class="msg" x1="318" y1="258" x2="547.5" y2="258"/>
  <text class="msgText" x="433" y="249">② POST /auth/login：发送登录表单</text>

  <line class="msg" x1="547.5" y1="296" x2="785" y2="296"/>
  <text class="msgText" x="666" y="287">③ 查询 auth users：校验密码并生成会话</text>

  <line class="ret" x1="785" y1="330" x2="547.5" y2="330"/>
  <text class="retText" x="666" y="321">④ 返回用户角色与会话 token</text>

  <line class="ret" x1="547.5" y1="348" x2="318" y2="348"/>
  <text class="retText" x="433" y="341">⑤ 登录成功：进入运行员 Dashboard</text>

  <!-- 2 Config and start -->
  <line class="msg" x1="107.5" y1="420" x2="318" y2="420"/>
  <text class="msgText" x="213" y="411">⑥ 选择地图大小、障碍、小车数量和算法</text>

  <line class="msg" x1="318" y1="460" x2="547.5" y2="460"/>
  <text class="msgText" x="433" y="451">⑦ POST /runtime/*：提交运行参数</text>

  <line class="msg" x1="547.5" y1="500" x2="785" y2="500"/>
  <text class="msgText" x="666" y="491">⑧ 保存配置：初始化 map、vehicles、events</text>

  <line class="msg" x1="107.5" y1="540" x2="318" y2="540"/>
  <text class="msgText" x="213" y="531">⑨ 点击启动仿真</text>

  <line class="msg" x1="318" y1="575" x2="547.5" y2="575"/>
  <text class="msgText" x="433" y="566">⑩ POST /control/start：请求开始运行</text>

  <line class="msg" x1="547.5" y1="590" x2="785" y2="590"/>
  <text class="msgText" x="666" y="581">⑪ 写入 RUNNING：启动后台 tick 调度</text>

  <!-- 3 Loop -->
  <line class="msg" x1="547.5" y1="710" x2="1022.5" y2="710"/>
  <text class="msgText" x="785" y="701">⑫ 调用 Robot.run_once：让小车扫描或执行路径</text>

  <line class="msg" x1="1022.5" y1="760" x2="785" y2="760"/>
  <text class="msgText" x="904" y="751">⑬ 写入感知结果：map patch、frontier、车辆状态</text>

  <line class="msg" x1="547.5" y1="810" x2="1240.5" y2="810"/>
  <text class="msgText" x="894" y="801">⑭ 调用 Controller.run_once：为 OPEN frontier 分配空闲小车</text>

  <line class="msg" x1="1240.5" y1="855" x2="785" y2="855"/>
  <text class="msgText" x="1013" y="846">⑮ 写入任务结果：task 与 navigationRequest</text>

  <line class="msg" x1="547.5" y1="900" x2="1455" y2="900"/>
  <text class="msgText" x="1001" y="891">⑯ 调用 Navigator.run_once：领取请求并计算路径</text>

  <line class="msg" x1="1455" y1="935" x2="785" y2="935"/>
  <text class="msgText" x="1120" y="926">⑰ 写入规划结果：navigationPlan，并把 path 放进 task.pathQueue</text>

  <rect class="note" x="86" y="862" width="390" height="58"/>
  <text class="noteText" x="104" y="885">补充：若 policy = low_mdp，小车直接基于局部 MDP 决策，</text>
  <text class="noteText" x="104" y="907">可跳过 Controller 与 Navigator 的全局分配和路径规划。</text>

  <!-- 4 Live update -->
  <line class="msg" x1="547.5" y1="1045" x2="785" y2="1045"/>
  <text class="msgText" x="666" y="1036">⑱ 读取 snapshot：mapDelta、vehicles、tasks、plans、events</text>

  <line class="ret" x1="547.5" y1="1082" x2="318" y2="1082"/>
  <text class="retText" x="433" y="1073">⑲ /ws 推送 STATE_SNAPSHOT</text>

  <line class="ret" x1="318" y1="1110" x2="107.5" y2="1110"/>
  <text class="retText" x="213" y="1101">⑳ 渲染 3D 地图、车辆、任务、路径和事件</text>

  <!-- 5 Stop and save -->
  <line class="msg" x1="107.5" y1="1180" x2="318" y2="1180"/>
  <text class="msgText" x="213" y="1171">㉑ 点击停止或重置</text>

  <line class="msg" x1="318" y1="1180" x2="547.5" y2="1180"/>
  <text class="msgText" x="433" y="1171">㉒ POST /control/stop 或 reset</text>

  <line class="msg" x1="547.5" y1="1180" x2="785" y2="1180"/>
  <text class="msgText" x="666" y="1171">㉓ 保存最后快照，结束 replay，更新状态</text>
</svg>
